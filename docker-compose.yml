services:
  postgres:
    image: postgres:16-alpine
    container_name: branas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: branas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./create.sql:/docker-entrypoint-initdb.d/01-create.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d branas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
